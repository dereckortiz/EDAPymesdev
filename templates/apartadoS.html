<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Servicio - EDAPymes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cobalt: '#034AB0', 'navy-dark': '#0F172A' },
          fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
    .material-symbols-outlined { vertical-align: middle; }

    /* ── ENTRY ANIMATION ── */
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .animate-slide-left  { animation: slideInLeft 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-slide-right { animation: slideInRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards; opacity: 0; }
    .animate-fade-up     { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
    .animate-scale-in    { animation: scaleIn 0.5s ease forwards; opacity: 0; }

    /* ── HEADER ── */
    .detail-header {
      background: white;
      border-bottom: 1px solid #E5E7EB;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #E5E7EB;
      color: #6B7280;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.25s ease;
      cursor: pointer;
      background: white;
      text-decoration: none;
    }
    .back-btn:hover {
      border-color: #034AB0;
      color: #034AB0;
      background: #EFF6FF;
      transform: translateX(-4px);
    }

    /* ── MAIN CARD ── */
    .detail-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(15,23,42,0.07), 0 1px 4px rgba(15,23,42,0.04);
      overflow: hidden;
    }
    .detail-image-pane {
      position: relative;
      min-height: 500px;
      background: #0F172A;
      overflow: hidden;
    }
    .detail-image-pane img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.72;
      position: absolute;
      inset: 0;
      transition: transform 8s ease;
    }
    .detail-image-pane:hover img { transform: scale(1.04); }
    .detail-badge {
      position: absolute;
      top: 28px; left: 28px;
      background: #034AB0;
      color: white;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(3,74,176,0.4);
    }
    .detail-image-text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 48px 36px;
      background: linear-gradient(to top, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.5) 60%, transparent 100%);
    }
    .detail-image-title {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      color: white;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .detail-image-desc { color: rgba(255,255,255,0.78); font-size: 1rem; max-width: 420px; }

    /* ── CONTENT PANE ── */
    .detail-content-pane {
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    @media (max-width: 768px) { .detail-content-pane { padding: 32px 24px; } }
    .detail-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 8px; }
    .detail-heading { font-family: 'Manrope', sans-serif; font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800; color: #0F172A; margin-bottom: 20px; line-height: 1.2; }
    .detail-description { color: #4B5563; line-height: 1.75; font-size: 1rem; }
    .benefits-title { font-family: 'Manrope', sans-serif; font-size: 1.3rem; font-weight: 700; color: #0F172A; margin-bottom: 16px; }
    .benefit-item { display: flex; align-items: flex-start; gap: 14px; padding: 12px 0; }
    .benefit-icon-wrap { width: 32px; height: 32px; min-width: 32px; background: #EFF6FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .benefit-icon-wrap .material-symbols-outlined { color: #034AB0; font-size: 1rem; }
    .benefit-name { font-weight: 700; font-size: 0.9rem; color: #0F172A; }
    .benefit-desc { font-size: 0.8rem; color: #6B7280; margin-top: 2px; }
    .btn-whatsapp {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 32px; background: #034AB0; color: white;
      font-family: 'Manrope', sans-serif; font-size: 1rem; font-weight: 800;
      border-radius: 999px; border: none; cursor: pointer;
      box-shadow: 0 8px 24px rgba(3,74,176,0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      text-decoration: none;
    }
    .btn-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(3,74,176,0.45); }
    .btn-whatsapp:active { transform: scale(0.98); }

    /* ── OTHER SERVICES ── */
    .other-services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 640px) { .other-services-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .other-services-grid { grid-template-columns: repeat(8, 1fr); } }
    .service-chip {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 12px; background: white; border-radius: 12px;
      border: 1.5px solid #E5E7EB; cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      text-decoration: none;
    }
    .service-chip:hover { border-color: #034AB0; box-shadow: 0 4px 16px rgba(3,74,176,0.12); transform: translateY(-3px); }
    .service-chip.active { border-color: #034AB0; border-width: 2px; background: #EFF6FF; }
    .service-chip .material-symbols-outlined { color: #034AB0; font-size: 1.4rem; }
    .service-chip span:last-child { font-size: 0.72rem; font-weight: 600; color: #4B5563; text-align: center; }
    .service-chip.active span:last-child { color: #034AB0; }

    /* ── PAGE TRANSITION (salida) ── */
    #page-exit {
      position: fixed; inset: 0;
      background: #034AB0;
      z-index: 9999;
      pointer-events: none;
      clip-path: circle(0% at 50% 50%);
      transition: clip-path 0.6s cubic-bezier(0.76, 0, 0.24, 1);
    }
    #page-exit.expanding { clip-path: circle(160% at 50% 50%); }
  </style>
</head>
<body>

<div id="page-exit"></div>

<!-- ── HEADER ── -->
<div class="detail-header">
  <div style="max-width:1200px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
    <button class="back-btn" onclick="volverAtras()">
      <span class="material-symbols-outlined" style="font-size:1.1rem;">arrow_back</span>
      Volver a Servicios
    </button>
    <span style="font-size:0.85rem; font-weight:600; color:#034AB0;" id="breadcrumb-title">Detalle del Servicio</span>
    <a href="index.html" style="display:inline-flex; align-items:center; gap:6px; color:#6B7280; font-size:0.85rem; font-weight:600; text-decoration:none; transition:color 0.2s ease;" onmouseover="this.style.color='#034AB0'" onmouseout="this.style.color='#6B7280'">
      <span class="material-symbols-outlined" style="font-size:1rem;">home</span>

</div>

<!-- ── MAIN ── -->
<main style="max-width:1200px; margin:0 auto; padding:32px 24px;">

      <!-- IMAGEN -->
      <div class="detail-image-pane animate-slide-left">

        <div class="detail-image-text">
          <h2 class="detail-image-title" id="detail-title-visual"></h2>
          <p class="detail-image-desc" id="detail-desc-visual"></p>
        </div>
      </div>

      <!-- CONTENIDO -->
      <div class="detail-content-pane animate-slide-right">
        <div style="display:flex; flex-direction:column; gap:28px;">
          <div>
            <p class="detail-label" id="detail-portafolio">PORTAFOLIO DE SERVICIOS</p>
            <h1 class="detail-heading" id="detail-heading"></h1>
            <p class="detail-description" id="detail-description"></p>
          </div>

          <div style="border-top:1px solid #F1F5F9; padding-top:24px;">
            <h3 class="benefits-title">Beneficios Clave</h3>
            <ul id="detail-benefits-list" style="display:flex; flex-direction:column; gap:0;"></ul>
          </div>

          <div style="padding-top:8px; display:flex; flex-wrap:wrap; gap:14px;">
            <button class="btn-whatsapp" id="btn-contacto" onclick="irAContacto()">
              <span class="material-symbols-outlined">chat</span>
              Solicitar Asesoría
              <span class="material-symbols-outlined" style="font-size:1rem;">arrow_forward</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- ── OTROS SERVICIOS ── -->
<section style="background:#F1F5F9; padding:48px 24px; border-top:1px solid #E5E7EB; margin-top:32px;">

    <p style="text-align:center; font-size:0.7rem; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:0.2em; margin-bottom:24px;">Explorar otros servicios</p>
    <div class="other-services-grid" id="services-grid"></div>
  </div>
</section>

      benefits: [

    },

      benefits: [

        { title: 'Garantía Extendida', desc: 'Respaldo completo en todos nuestros equipos vendidos.' },

  const allServices = [
    { key: 'capacitacion', icon: 'school',          label: 'Capacitación' },
    { key: 'asesoria',     icon: 'business_center',  label: 'Consultoría' },
    { key: 'desarrollo',   icon: 'code',             label: 'Software' },
    { key: 'soporte',      icon: 'settings_suggest', label: 'Soporte IT' },
    { key: 'seguridad',    icon: 'videocam',          label: 'Seguridad' },
    { key: 'financiamiento',icon:'payments',          label: 'Créditos' },
    { key: 'traduccion',   icon: 'translate',         label: 'Traducción' },
    { key: 'laptops',      icon: 'laptop_mac',        label: 'Laptops' },
  ];

  /* ── CARGAR DATOS ── */
  const params = new URLSearchParams(window.location.search);
  const serviceKey = params.get('service') || 'asesoria';
  const data = serviceData[serviceKey];

  if (data) {
    document.getElementById('detail-image').src = data.image;
    document.getElementById('detail-badge').textContent = data.badge;
    document.getElementById('detail-title-visual').textContent = data.titleVisual;
    document.getElementById('detail-desc-visual').textContent = data.descVisual;
    document.getElementById('detail-portafolio').textContent = data.portafolio;
    document.getElementById('detail-heading').textContent = data.heading;
    document.getElementById('detail-description').textContent = data.description;
    document.getElementById('breadcrumb-title').textContent = data.heading;
    document.title = `${data.heading} - EDAPymes`;

    const list = document.getElementById('detail-benefits-list');
    list.innerHTML = '';
    data.benefits.forEach(b => {
      const li = document.createElement('li');
      li.className = 'benefit-item';
      li.innerHTML = `
        <div class="benefit-icon-wrap">
          <span class="material-symbols-outlined">check</span>
        </div>
        <div>
          <div class="benefit-name">${b.title}</div>
          <div class="benefit-desc">${b.desc}</div>
        </div>`;
      list.appendChild(li);
    });
  }

  /* ── CHIPS DE OTROS SERVICIOS ── */
  const grid = document.getElementById('services-grid');
  allServices.forEach(svc => {
    const chip = document.createElement('div');
    chip.className = 'service-chip' + (svc.key === serviceKey ? ' active' : '');
    chip.innerHTML = `
      <span class="material-symbols-outlined">${svc.icon}</span>
      <span>${svc.label}</span>`;
    chip.onclick = () => cambiarServicio(svc.key, chip);
    grid.appendChild(chip);
  });

  /* ── CAMBIAR SERVICIO CON TRANSICIÓN ── */
  function cambiarServicio(key, chipEl) {
    if (key === serviceKey) return;
    const overlay = document.getElementById('page-exit');
    overlay.classList.add('expanding');
    setTimeout(() => { window.location.href = `apartadoS.html?service=${key}`; }, 550);
  }

  /* ── VOLVER ATRÁS ── */
  function volverAtras() {
    const overlay = document.getElementById('page-exit');
    overlay.classList.add('expanding');
    setTimeout(() => {
      // Intentar volver al historial; si no hay historial, ir a servicios
      if (document.referrer && document.referrer.includes('servicios')) {
        history.back();
      } else {
        window.location.href = 'servicios.html';
      }
    }, 550);
  }

  /* ── BOTÓN CONTACTO ── */
  function irAContacto() {
    const msg = encodeURIComponent(`Hola, me interesa el servicio de: ${data ? data.heading : 'información general'}`);
    window.open(`https://wa.me/50583295424?text=${msg}`, '_blank');
  }

  /* ── ENTRADA ELEGANTE ── */
  document.addEventListener('DOMContentLoaded', () => {
    document.body.style.opacity = '0';
    requestAnimationFrame(() => {
      document.body.style.transition = 'opacity 0.4s ease';
      document.body.style.opacity = '1';
    });

    // Animar chips con delay escalonado
    document.querySelectorAll('.service-chip').forEach((chip, idx) => {
      chip.style.opacity = '0';
      chip.style.transform = 'translateY(20px)';
      chip.style.transition = `opacity 0.4s ease ${0.3 + idx * 0.05}s, transform 0.4s ease ${0.3 + idx * 0.05}s`;
      requestAnimationFrame(() => {
        chip.style.opacity = '1';
        chip.style.transform = 'translateY(0)';
      });
    });
  });
</script>
</body>
</html>
