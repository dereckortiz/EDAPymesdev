<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-primary": "#498ffa",
              "on-secondary-fixed-variant": "#394d8e",
              "error": "#b31b25",
              "surface-dim": "#d2d5d5",
              "on-secondary-container": "#2f4484",
              "surface-tint": "#034AB0",
              "on-primary-fixed-variant": "#002b5e",
              "primary-container": "#D6E3FF",
              "error-dim": "#9f0519",
              "on-tertiary-container": "#333d6c",
              "inverse-surface": "#0c0f0f",
              "surface-container-highest": "#dbdddd",
              "surface-container-high": "#e1e3e3",
              "on-error-container": "#570008",
              "on-background": "#2d2f2f",
              "outline-variant": "#acadad",
              "secondary": "#445899",
              "secondary-fixed-dim": "#b1c1ff",
              "tertiary-dim": "#424d7c",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#2d2f2f",
              "on-error": "#ffefee",
              "secondary-container": "#c5d0ff",
              "inverse-on-surface": "#9c9d9d",
              "on-primary-fixed": "#000000",
              "primary-dim": "#004ea0",
              "surface-variant": "#dbdddd",
              "primary-fixed": "#68a0ff",
              "surface-bright": "#f6f6f6",
              "secondary-fixed": "#c5d0ff",
              "on-tertiary-fixed-variant": "#3c4675",
              "tertiary-fixed": "#b9c4fb",
              "background": "#f6f6f6",
              "surface-container-low": "#f0f1f1",
              "on-surface-variant": "#5a5c5c",
              "on-primary-container": "#00224c",
              "on-tertiary": "#f2f1ff",
              "surface": "#f6f6f6",
              "primary-fixed-dim": "#4c92fd",
              "tertiary": "#4e5989",
              "primary": "#034AB0",
              "on-tertiary-fixed": "#1e2956",
              "surface-container": "#e7e8e8",
              "outline": "#757777",
              "on-secondary-fixed": "#19306f",
              "on-secondary": "#f1f2ff",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#acb6ec",
              "tertiary-container": "#b9c4fb",
              "secondary-dim": "#384c8d",
              "error-container": "#fb5151"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Manrope', sans-serif; }
        
        /* Botón de regreso */
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: #034AB0;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .back-button:hover {
            transform: translateY(-3px);
            background: #023a8a;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .back-button:active {
            transform: translateY(0);
        }
        
        /* Estilos para el zoom de imagen */
        .image-container {
            position: relative;
            overflow: hidden;
            cursor: zoom-in;
        }
        .image-container img {
            transition: transform 0.3s ease;
        }
        .image-container:hover img {
            transform: scale(1.1);
        }
        .zoom-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .image-container:hover .zoom-icon {
            opacity: 1;
        }
        
        /* Miniaturas */
        .thumbnail {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .thumbnail:hover {
            transform: scale(1.05);
            border-color: #034AB0;
        }
        .thumbnail.active {
            border-color: #034AB0;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">

<!-- Botón flotante para regresar al catálogo -->
<button class="back-button" onclick="volverAlCatalogo()">
    <span class="material-symbols-outlined">arrow_back</span>
    Volver al Catálogo
</button>

<main class="pt-12 pb-16 px-6 max-w-7xl mx-auto">

<!-- Breadcrumb Navigation -->
<nav class="flex items-center gap-2 mb-8 text-[10px] font-bold uppercase tracking-[0.2em] text-outline">
    <a class="hover:text-primary transition-colors cursor-pointer" onclick="volverAlCatalogo()">Catálogo</a>
    <span class="material-symbols-outlined text-[10px]">chevron_right</span>
    <span class="text-on-surface" id="breadcrumbNombre">Detalle del Producto</span>
</nav>

<!-- Product Hero Grid -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
    <!-- Left: Product Gallery -->
    <div class="lg:col-span-7 space-y-6">
        <div class="relative bg-surface-container-lowest overflow-hidden rounded-xl image-container" id="mainImageContainer">
            <img id="imagenProducto" alt="Producto" class="w-full aspect-[4/5] object-cover" src="https://via.placeholder.com/600x800?text=Sin+Imagen"/>
            <div class="zoom-icon">
                <span class="material-symbols-outlined">zoom_in</span>
            </div>
        </div>
        <!-- Galería de miniaturas - hasta 6 imágenes -->
        <div id="galeriaMiniaturas" class="grid grid-cols-3 md:grid-cols-6 gap-3">
            <!-- Las miniaturas se cargarán dinámicamente -->
        </div>
    </div>
    
    <!-- Right: Product Information -->
    <div class="lg:col-span-5 space-y-8">
        <header class="space-y-4">
            <h1 id="nombreProducto" class="text-5xl font-headline font-extrabold tracking-tighter text-on-surface leading-none">
                Cargando...
            </h1>
            <div class="flex items-center justify-between pt-2">
                <span id="precioProducto" class="text-3xl font-headline font-light tracking-tighter text-on-surface">C$0.00</span>
                <span id="disponibilidadBadge" class="bg-green-500 text-white text-xs px-3 py-1 rounded-full">Disponible</span>
            </div>
        </header>
        
        <!-- Descripción -->
        <div class="space-y-6">
            <p id="descripcionProducto" class="text-lg leading-relaxed text-on-surface-variant font-medium opacity-80">
                Cargando información del producto...
            </p>
            <div class="flex flex-wrap gap-2" id="tagsContainer">
                <!-- Tags de categoría y características -->
            </div>
        </div>
        
        <!-- Purchase Section - Solo WhatsApp -->
        <div class="space-y-6 pt-4">
            <button class="w-full bg-green-600 text-white py-5 rounded-lg font-headline font-extrabold text-sm tracking-widest uppercase hover:bg-green-700 transition-all active:scale-[0.98] shadow-lg flex items-center justify-center gap-2" onclick="whatsappContacto()">
                <span class="material-symbols-outlined">chat</span>
                Contactar por WhatsApp
            </button>
            
            <!-- Características Técnicas (Especificaciones) -->
            <div class="space-y-3">
                <h3 class="text-sm font-bold uppercase tracking-wider text-on-surface">Especificaciones Técnicas</h3>
                <div id="especificacionesContainer" class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 text-center text-gray-500 py-4">Cargando especificaciones...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Productos Relacionados (misma categoría) -->
<section class="mt-24 space-y-12">
    <div class="flex justify-between items-end border-b border-outline-variant/20 pb-4">
        <h3 class="text-2xl font-headline font-extrabold tracking-tighter uppercase">Productos Relacionados</h3>
        <a class="text-[10px] font-bold uppercase tracking-widest text-primary hover:underline cursor-pointer" onclick="volverAlCatalogo()">Ver todos</a>
    </div>
    <div id="productosRelacionados" class="grid grid-cols-2 md:grid-cols-4 gap-8">
        <div class="col-span-full text-center text-gray-500">Cargando productos relacionados...</div>
    </div>
</section>

</main>

<script>
// Variables globales
let productoActual = null;
let productosGlobal = [];
let categoriaProducto = null;
let todasLasImagenes = [];

// Obtener parámetros de la URL
const params = new URLSearchParams(window.location.search);
const nombreParam = params.get("nombre");
const precioParam = params.get("precio");
const imagenParam = params.get("imagen");

// Función para regresar al catálogo - VERSIÓN SIMPLE
function volverAlCatalogo() {
    // Redirigir al index con el catálogo cargado
    window.location.href = '/?cargar=catalogo';
}

// Función para contacto por WhatsApp
function whatsappContacto() {
    const mensaje = `Hola, me gustaría recibir información sobre EDAPymes y el producto: ${productoActual?.nombre || ''}\nPrecio: C$${productoActual?.precio || ''}`;
    window.open(`https://wa.me/50588888888?text=${encodeURIComponent(mensaje)}`, '_blank');
}

// Cargar datos completos del producto desde la API
async function cargarProductoCompleto() {
    try {
        const res = await fetch("http://localhost:3000/api/productos");
        const productos = await res.json();
        productosGlobal = productos;
        
        // Buscar el producto por nombre (coincidencia exacta o aproximada)
        let productoEncontrado = null;
        
        if (nombreParam) {
            productoEncontrado = productos.find(p => 
                p.nombre.toLowerCase() === nombreParam.toLowerCase() ||
                p.nombre.toLowerCase().includes(nombreParam.toLowerCase())
            );
        }
        
        // Si no se encuentra por nombre, usar los parámetros de URL
        if (!productoEncontrado && nombreParam) {
            productoEncontrado = {
                id: 0,
                nombre: nombreParam,
                precio: parseFloat(precioParam) || 0,
                imagen: imagenParam || null,
                imagenes: imagenParam ? [imagenParam] : [],
                imagenes_raw: [],
                descripcion: "Producto de alta calidad con especificaciones técnicas avanzadas. Diseñado para satisfacer las necesidades más exigentes del mercado actual.",
                especificaciones: [],
                categoria: null,
                disponible: true
            };
        } else if (productoEncontrado) {
            productoEncontrado.precio = parseFloat(productoEncontrado.precio);
        }
        
        if (productoEncontrado) {
            productoActual = productoEncontrado;
            categoriaProducto = productoActual.categoria;
            // Obtener todas las imágenes
            todasLasImagenes = [];
            if (productoActual.imagenes && productoActual.imagenes.length > 0) {
                todasLasImagenes = productoActual.imagenes;
            } else if (productoActual.imagenes_raw && productoActual.imagenes_raw.length > 0) {
                todasLasImagenes = productoActual.imagenes_raw.map(img => `http://localhost:3000/uploads/${img.filename}`);
            } else if (productoActual.imagen) {
                todasLasImagenes = [productoActual.imagen];
            }
            
            renderizarProducto(productoActual);
            cargarProductosRelacionados(categoriaProducto, productoActual.id);
        } else {
            mostrarError("Producto no encontrado");
        }
        
    } catch (error) {
        console.error("Error cargando producto:", error);
        mostrarError("Error al cargar los datos del producto");
    }
}

// Renderizar la información del producto
function renderizarProducto(producto) {
    // Nombre
    document.getElementById("nombreProducto").textContent = producto.nombre || "Producto";
    document.getElementById("breadcrumbNombre").textContent = producto.nombre || "Detalle";
    
    // Precio
    const precio = typeof producto.precio === 'number' ? producto.precio.toFixed(2) : producto.precio;
    document.getElementById("precioProducto").textContent = `C$${precio}`;
    
    // Disponibilidad
    const disponibilidadBadge = document.getElementById("disponibilidadBadge");
    if (producto.disponible) {
        disponibilidadBadge.textContent = "Disponible";
        disponibilidadBadge.className = "bg-green-500 text-white text-xs px-3 py-1 rounded-full";
    } else {
        disponibilidadBadge.textContent = "Agotado";
        disponibilidadBadge.className = "bg-red-500 text-white text-xs px-3 py-1 rounded-full";
    }
    
    // Imagen principal (la primera)
    const imagenPrincipal = document.getElementById("imagenProducto");
    if (todasLasImagenes.length > 0) {
        imagenPrincipal.src = todasLasImagenes[0];
    } else {
        imagenPrincipal.src = "https://via.placeholder.com/600x800?text=Sin+Imagen";
    }
    
    // Descripción
    const descripcionElement = document.getElementById("descripcionProducto");
    if (producto.descripcion) {
        descripcionElement.textContent = producto.descripcion;
    } else {
        descripcionElement.textContent = "Producto tecnológico de alta calidad. Consulta con nuestros asesores para obtener más información sobre este producto y sus aplicaciones.";
    }
    
    // Tags (categoría)
    const tagsContainer = document.getElementById("tagsContainer");
    tagsContainer.innerHTML = '';
    if (producto.categoria) {
        tagsContainer.innerHTML += `<div class="bg-surface-container-highest px-3 py-1 rounded-sm text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">${escapeHtml(producto.categoria)}</div>`;
    }
    
    // Galería de miniaturas - TODAS las imágenes (hasta 6)
    const galeriaMiniaturas = document.getElementById("galeriaMiniaturas");
    galeriaMiniaturas.innerHTML = '';
    
    const maxImagenes = Math.min(todasLasImagenes.length, 6);
    for (let i = 0; i < maxImagenes; i++) {
        const imgUrl = todasLasImagenes[i];
        galeriaMiniaturas.innerHTML += `
            <div class="thumbnail rounded-lg overflow-hidden aspect-square bg-surface-container-low cursor-pointer ${i === 0 ? 'active' : ''}" onclick="cambiarImagenPrincipal(${i})">
                <img src="${imgUrl}" class="w-full h-full object-cover" alt="Miniatura ${i + 1}" onerror="this.src='https://via.placeholder.com/100x100?text=Error'">
            </div>
        `;
    }
    
    // Si hay menos de 6 imágenes, mostrar placeholders
    for (let i = maxImagenes; i < 6; i++) {
        galeriaMiniaturas.innerHTML += `
            <div class="rounded-lg overflow-hidden aspect-square bg-surface-container-low flex items-center justify-center">
                <span class="material-symbols-outlined text-outline">image</span>
            </div>
        `;
    }
    
    // Especificaciones técnicas
    const especificacionesContainer = document.getElementById("especificacionesContainer");
    especificacionesContainer.innerHTML = '';
    
    if (producto.especificaciones && producto.especificaciones.length > 0) {
        producto.especificaciones.forEach(spec => {
            if (spec.label && spec.value) {
                especificacionesContainer.innerHTML += `
                    <div class="bg-surface-container-low p-3 rounded-lg flex items-center gap-3 transition-colors hover:bg-surface-container">
                        <span class="material-symbols-outlined text-primary text-xl">${spec.icono || 'bolt'}</span>
                        <div class="flex-1">
                            <h4 class="text-[10px] font-bold uppercase tracking-wider">${escapeHtml(spec.label)}</h4>
                            <p class="text-[11px] text-on-surface-variant">${escapeHtml(spec.value)}</p>
                        </div>
                    </div>
                `;
            }
        });
    } else {
        especificacionesContainer.innerHTML = `
            <div class="col-span-2 text-center text-gray-500 py-4">
                No hay especificaciones técnicas disponibles
            </div>
        `;
    }
}

// Cambiar imagen principal al hacer clic en miniatura
function cambiarImagenPrincipal(index) {
    if (todasLasImagenes[index]) {
        const imagenPrincipal = document.getElementById("imagenProducto");
        imagenPrincipal.src = todasLasImagenes[index];
        
        // Actualizar clase activa en miniaturas
        const miniaturas = document.querySelectorAll('.thumbnail');
        miniaturas.forEach((thumb, i) => {
            if (i === index) {
                thumb.classList.add('active');
            } else {
                thumb.classList.remove('active');
            }
        });
    }
}

// Cargar productos relacionados (misma categoría)
async function cargarProductosRelacionados(categoria, idActual) {
    const container = document.getElementById("productosRelacionados");
    
    try {
        const res = await fetch("http://localhost:3000/api/productos");
        const productos = await res.json();
        
        let relacionados = [];
        if (categoria) {
            relacionados = productos.filter(p => p.categoria === categoria && p.id !== idActual);
        }
        
        // Si no hay relacionados, mostrar otros productos
        if (relacionados.length === 0) {
            relacionados = productos.filter(p => p.id !== idActual).slice(0, 4);
        } else {
            relacionados = relacionados.slice(0, 4);
        }
        
        if (relacionados.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-500">No hay productos relacionados</div>';
            return;
        }
        
        container.innerHTML = '';
        relacionados.forEach(p => {
            let imagenUrl = 'https://via.placeholder.com/300x300?text=Sin+Imagen';
            if (p.imagenes && p.imagenes.length > 0) imagenUrl = p.imagenes[0];
            else if (p.imagen) imagenUrl = p.imagen;
            else if (p.imagenes_raw && p.imagenes_raw.length > 0) imagenUrl = `http://localhost:3000/uploads/${p.imagenes_raw[0].filename}`;
            
            container.innerHTML += `
                <div class="group cursor-pointer" onclick="verProductoRelacionado('${encodeURIComponent(p.nombre)}', ${p.precio}, '${imagenUrl}')">
                    <div class="aspect-square bg-surface-container-low rounded-xl mb-4 overflow-hidden relative">
                        <div class="absolute inset-0 bg-primary/0 group-hover:bg-primary/5 transition-colors"></div>
                        <img src="${imagenUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/300x300?text=Error'">
                    </div>
                    <h4 class="text-sm font-bold uppercase tracking-wider mb-1">${escapeHtml(p.nombre)}</h4>
                    <p class="text-xs text-on-surface-variant font-bold">C$${parseFloat(p.precio).toFixed(2)}</p>
                </div>
            `;
        });
        
    } catch (error) {
        console.error("Error cargando relacionados:", error);
        container.innerHTML = '<div class="col-span-full text-center text-red-500">Error al cargar productos relacionados</div>';
    }
}

// Ver producto relacionado
function verProductoRelacionado(nombre, precio, imagen) {
    const url = `ventanaC.html?nombre=${encodeURIComponent(nombre)}&precio=${precio}&imagen=${encodeURIComponent(imagen)}`;
    window.location.href = url;
}

// Función para escapar HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Mostrar error
function mostrarError(mensaje) {
    const main = document.querySelector('main');
    main.innerHTML = `
        <div class="text-center py-20">
            <span class="material-symbols-outlined text-6xl text-red-500">error</span>
            <h2 class="text-2xl font-bold mt-4">${mensaje}</h2>
            <button onclick="volverAlCatalogo()" class="mt-6 bg-primary text-white px-6 py-3 rounded-lg font-bold">Volver al Catálogo</button>
        </div>
    `;
}

// Inicializar
document.addEventListener("DOMContentLoaded", () => {
    cargarProductoCompleto();
});

// Exponer funciones globales
window.volverAlCatalogo = volverAlCatalogo;
window.whatsappContacto = whatsappContacto;
window.cambiarImagenPrincipal = cambiarImagenPrincipal;
window.verProductoRelacionado = verProductoRelacionado;
</script>

</body>
</html>
