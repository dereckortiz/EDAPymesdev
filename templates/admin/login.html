<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - EDAPymes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .background-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-container {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: 16px;
            padding: 52px 40px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08), 0 1px 8px rgba(0, 0, 0, 0.04);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-top: 8px;
            margin-bottom: 32px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: flex-end;
            gap: 6px;
            margin-right: 12px;
            vertical-align: middle;
        }

        .logo-icon .bar {
            width: 14px;
            border-radius: 2px 2px 0 0;
        }

        .logo-icon .bar:nth-child(1) {
            height: 18px;
            background: #1a3a6b;
        }

        .logo-icon .bar:nth-child(2) {
            height: 28px;
            background: #1a5fb4;
        }

        .logo-icon .bar:nth-child(3) {
            height: 38px;
            background: linear-gradient(180deg, #1a5fb4 0%, #0066cc 100%);
        }

        .logo-text {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .logo-text .eda {
            font-size: 36px;
            font-weight: 800;
            color: #1a2a4a;
            letter-spacing: -0.5px;
        }

        .logo-text .pymes {
            font-size: 36px;
            font-weight: 600;
            color: #0055cc;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #1a2a4a;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 500;
        }

        .divider-line {
            width: 60px;
            height: 2px;
            background: #0055cc;
            margin: 16px auto 0;
            border-radius: 1px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #0055cc;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #0055cc;
            display: flex;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 14px 44px;
            border: 1.5px solid #d0d8e4;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            background: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #0055cc;
            box-shadow: 0 0 0 3px rgba(0, 85, 204, 0.1);
        }

        .form-input::placeholder {
            color: #8a95a5;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #0055cc;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color 0.2s;
            z-index: 3;
        }

        .toggle-password:hover {
            color: #003da5;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0055cc 0%, #0044aa 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #0044aa 0%, #003399 100%);
            box-shadow: 0 4px 15px rgba(0, 68, 170, 0.3);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            margin-top: 16px;
            padding: 12px 16px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            display: none;
        }

        .error-message.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .copyright {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8a95a5;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 16px;
                padding: 44px 24px 32px;
            }

            .logo-text .eda,
            .logo-text .pymes {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Fondo opcional: reemplaza TU_IMAGEN_AQUI.jpg con tu imagen -->
    <div class="background-image">
        <img src="/EDAPyme/src/image/loging.png" alt="Fondo" onerror="this.parentElement.style.display='none'">
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div>
                <span class="logo-icon">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </span>
                <span class="logo-text">
                    <span class="eda">EDA</span><span class="pymes">Pymes</span>
                </span>
            </div>
            <div class="subtitle">Panel Administrativo</div>
            <div class="divider-line"></div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" autocomplete="username" class="form-input" placeholder="Ingresa tu usuario" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" autocomplete="current-password" class="form-input" placeholder="Ingresa tu contraseña" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnLogin" class="btn-login">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Iniciar Sesión
            </button>
        </form>

        <div id="errorMessage" class="error-message"></div>

        <div class="copyright">© 2026 EDAPymes - Todos los derechos reservados</div>
    </div>

    <script>
        // ============================================
        // ⚠️ VARIABLES Y FUNCIONALIDAD ORIGINAL - NO MODIFICAR
        // ============================================
        const API = "https://edapymesdev.onrender.com/api";
        
        // Verificar si ya hay una sesión activa al cargar la página
        async function verificarSesionExistente() {
            try {
                const response = await fetch(`${API}/check-session`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                if (data.authenticated) {
                    // Ya hay sesión, redirigir directamente
                    window.location.replace('https://edapymesdev.onrender.com/admin.html');
                }
            } catch (error) {
                console.log('No hay sesión activa');
            }
        }
        
        // Verificar al cargar
        verificarSesionExistente();
        
        // Toggle para mostrar/ocultar contraseña (integrado con diseño nuevo)
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            }
        });
        
        // Handler de login - FUNCIONALIDAD ORIGINAL PRESERVADA
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('errorMessage');
            
            // Estado de carga con diseño nuevo
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<div class="loading-spinner"></div> Verificando...';
            errorDiv.classList.remove('visible');
            errorDiv.textContent = '';
            
            try {
                console.log('Intentando login...');
                
                const response = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Status response:', response.status);
                const data = await response.json();
                console.log('Data response:', data);
                
                if (response.ok && data.success) {
                    console.log('Login exitoso, redirigiendo...');
                    // Pequeña pausa para asegurar que la cookie se establezca
                    setTimeout(() => {
                        window.location.replace('https://edapymesdev.onrender.com/admin.html');
                    }, 100);
                } else {
                    errorDiv.textContent = data.error || 'Credenciales incorrectas';
                    errorDiv.classList.add('visible');
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = `
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Iniciar Sesión
                    `;
                }
            } catch (error) {
                console.error('Error detallado:', error);
                errorDiv.textContent = 'Error de conexión: ' + error.message;
                errorDiv.classList.add('visible');
                btnLogin.disabled = false;
                btnLogin.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Iniciar Sesión
                `;
            }
        });
        
        // Función utilitaria para probar sesión (opcional, original)
        window.testSession = async function() {
            const response = await fetch(`${API}/check-session`, {
                credentials: 'include'
            });
            const data = await response.json();
            console.log('Estado de sesión:', data);
        };
    </script>
</body>
</html>
