<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#0059b6",
        secondary: "#445899"
      },
      fontFamily: {
        headline: ["Manrope"],
        body: ["Inter"]
      }
    }
  }
}
</script>

<style>
body {
  background-color: #f6f6f6;
  color: #2d2f2f;
  font-family: 'Inter', sans-serif;
}
.material-symbols-outlined {
  vertical-align: middle;
}
.loading-spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 4px solid #f3f3f3;
  border-top: 4px solid #0059b6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="flex min-h-screen">

<!-- SIDEBAR DINÁMICO -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col gap-2 z-40">
  <div class="px-8 py-6">
    <h2 class="font-bold text-lg text-slate-900">Collections</h2>
    <p class="text-xs text-slate-500">Precision Curated Tech</p>
  </div>

  <nav id="navCategorias" class="flex flex-col gap-1"></nav>
  
  <!-- Botón para mostrar todos los productos -->
  <div class="mt-4 px-6">
    <button onclick="mostrarTodosLosProductos()" 
            class="w-full text-left flex items-center gap-3 text-slate-500 px-6 py-3 hover:bg-slate-100 cursor-pointer rounded-lg">
      <span class="material-symbols-outlined">apps</span>
      <span>Todos los productos</span>
    </button>
  </div>
</aside>

<!-- CONTENIDO -->
<main class="ml-64 flex-1">

<!-- CARRUSEL -->
<section class="relative w-full h-[400px] overflow-hidden">
  <div id="carousel" class="flex transition-transform duration-700">

    <div class="min-w-full h-[400px] relative">
      <img src="/src/image/foto11.jpg" class="w-full h-full object-cover" alt="Tecnología">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Tecnología de Última Generación</h2>
      </div>
    </div>

    <div class="min-w-full h-[400px] relative">
      <img src="/src/image/foto12.jpg" class="w-full h-full object-cover" alt="Equipos">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Equipos Profesionales</h2>
      </div>
    </div>

    <div class="min-w-full h-[400px] relative">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" class="w-full h-full object-cover" alt="Accesorios">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Accesorios Premium</h2>
      </div>
    </div>

  </div>

  <!-- BUSCADOR -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-4">
    <input id="buscador"
           type="text"
           placeholder="Buscar productos..."
           class="w-full px-4 py-3 rounded-full shadow-lg outline-none focus:ring-2 focus:ring-blue-500">
  </div>
</section>

<!-- CONTENIDO -->
<div class="p-12">

<header class="mb-16 max-w-4xl">
  <h1 class="text-5xl font-bold mb-6">
    Tecnología <span class="text-primary italic">Empresarial</span>
  </h1>
  <p class="text-lg text-gray-500">
    Soluciones tecnológicas diseñadas para impulsar tu negocio.
  </p>
</header>

<!-- GRID PRODUCTOS -->
<div id="gridProductos"
     class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8">
  <!-- Loading spinner -->
  <div class="col-span-full flex justify-center items-center py-20">
    <div class="loading-spinner"></div>
    <span class="ml-3 text-gray-500">Cargando productos...</span>
  </div>
</div>

</div>
</main>
</div>

<script>
let productosGlobal = [];
let categoriaActual = null;

// Función para mostrar todos los productos
function mostrarTodosLosProductos() {
  categoriaActual = null;
  renderProductos(productosGlobal);
  
  // Actualizar estilo activo en el sidebar
  document.querySelectorAll('#navCategorias a').forEach(link => {
    link.classList.remove('bg-slate-200', 'text-primary');
    link.classList.add('text-slate-500');
  });
}

async function cargarProductos() {
  const contenedor = document.getElementById("gridProductos");

  try {
    console.log("Intentando conectar a: http://localhost:3000/api/productos");
    const res = await fetch("http://localhost:3000/api/productos");
    
    console.log("Respuesta del servidor:", res.status);
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    productosGlobal = await res.json();
    console.log("Productos cargados:", productosGlobal);
    console.log("Cantidad de productos:", productosGlobal.length);
    
    if (productosGlobal.length === 0) {
      console.log("No hay productos en la base de datos");
    }
    
    renderProductos(productosGlobal);
  } catch (err) {
    console.error("Error detallado cargando productos:", err);
    contenedor.innerHTML = `<div class='col-span-full text-center py-20'>
      <p class='text-red-500'>Error al cargar productos: ${err.message}</p>
      <p class='text-gray-500 mt-2'>Verifica que el servidor esté corriendo en http://localhost:3000</p>
      <button onclick='cargarProductos()' class='mt-4 bg-blue-600 text-white px-4 py-2 rounded'>Reintentar</button>
    </div>`;
  }
}

// Función para renderizar productos
function renderProductos(lista) {
  const contenedor = document.getElementById("gridProductos");
  
  if (!lista || lista.length === 0) {
    contenedor.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-gray-500'>No se encontraron productos</p></div>";
    return;
  }

  contenedor.innerHTML = "";

  lista.forEach(p => {
    // Manejar URL de imagen correctamente
    let imagenUrl = '';
    if (p.imagen) {
      // Si ya es una URL completa, usarla, si no, construirla
      if (p.imagen.startsWith('http')) {
        imagenUrl = p.imagen;
      } else if (p.imagen.startsWith('/uploads/')) {
        imagenUrl = `http://localhost:3000${p.imagen}`;
      } else {
        imagenUrl = `http://localhost:3000/uploads/${p.imagen}`;
      }
    } else {
      // Imagen por defecto si no hay
      imagenUrl = 'https://via.placeholder.com/400x300?text=Sin+Imagen';
    }
    
    const precioFormateado = typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio;
    
    contenedor.innerHTML += `
    <div onclick="verProducto('${escapeHtml(p.nombre)}','${p.precio}','${imagenUrl}')"
         class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden cursor-pointer group">

      <div class="relative overflow-hidden h-56">
        <img src="${imagenUrl}" 
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
             onerror="this.src='https://via.placeholder.com/400x300?text=Imagen+no+disponible'">
        <span class="absolute top-3 right-3 ${p.disponible ? 'bg-green-600' : 'bg-red-600'} text-white text-xs px-3 py-1 rounded-full">
          ${p.disponible ? "Disponible" : "Agotado"}
        </span>
      </div>

      <div class="p-5 space-y-2">
        <p class="text-sm text-gray-400">${escapeHtml(p.categoria || "General")}</p>
        <h3 class="font-bold text-lg text-gray-800 line-clamp-2">${escapeHtml(p.nombre)}</h3>

        <div class="flex justify-between items-center pt-2">
          <span class="text-blue-600 font-bold text-xl">
            C$${precioFormateado}
          </span>

          <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
            Cotizar
          </button>
        </div>
      </div>
    </div>`;
  });
}

// Función para escapar HTML (seguridad)
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Función para cargar categorías desde la API
async function cargarCategorias() {
  const nav = document.getElementById("navCategorias");

  try {
    const res = await fetch("http://localhost:3000/api/categorias");
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    const categorias = await res.json();
    console.log("Categorías cargadas:", categorias); // Para debug

    nav.innerHTML = "";

    if (categorias.length === 0) {
      nav.innerHTML = "<p class='px-6 text-gray-500'>No hay categorías</p>";
      return;
    }

    categorias.forEach(c => {
      nav.innerHTML += `
      <a onclick="filtrarCategoria('${escapeHtml(c.nombre)}')"
         class="flex items-center gap-3 text-slate-500 px-6 py-3 hover:bg-slate-100 cursor-pointer transition-colors categoria-link">
        <span class="material-symbols-outlined">category</span>
        <span>${escapeHtml(c.nombre)}</span>
      </a>`;
    });

  } catch (err) {
    console.error("Error cargando categorías:", err);
    nav.innerHTML = "<p class='px-6 text-red-500'>Error al cargar categorías</p>";
  }
}

// Función para filtrar por categoría
function filtrarCategoria(nombre) {
  categoriaActual = nombre;
  const filtrados = productosGlobal.filter(p => p.categoria === nombre);
  renderProductos(filtrados);
  
  // Actualizar estilo activo en el sidebar
  document.querySelectorAll('#navCategorias a').forEach(link => {
    const linkText = link.querySelector('span:last-child')?.innerText;
    if (linkText === nombre) {
      link.classList.add('bg-slate-200', 'text-primary');
      link.classList.remove('text-slate-500');
    } else {
      link.classList.remove('bg-slate-200', 'text-primary');
      link.classList.add('text-slate-500');
    }
  });
}

// Función de búsqueda en tiempo real
let timeoutId;
document.addEventListener("input", e => {
  if (e.target.id === "buscador") {
    clearTimeout(timeoutId);
    timeoutId = setTimeout(() => {
      const texto = e.target.value.toLowerCase().trim();
      
      let filtrados;
      if (texto === "") {
        // Si no hay texto, mostrar según categoría actual
        if (categoriaActual) {
          filtrados = productosGlobal.filter(p => p.categoria === categoriaActual);
        } else {
          filtrados = [...productosGlobal];
        }
      } else {
        filtrados = productosGlobal.filter(p => 
          p.nombre.toLowerCase().includes(texto) ||
          (p.categoria && p.categoria.toLowerCase().includes(texto))
        );
      }
      renderProductos(filtrados);
    }, 300);
  }
});

// Función para ver producto (redirigir a ventana de cotización)
function verProducto(nombre, precio, imagen) {
  const url = `ventanaC.html?nombre=${encodeURIComponent(nombre)}&precio=${encodeURIComponent(precio)}&imagen=${encodeURIComponent(imagen)}`;
  window.location.href = url;
}

// Inicializar todo
function iniciarTodo() {
  cargarProductos();
  cargarCategorias();
}

// Carrusel automático
let index = 0;
let carouselInterval;

function iniciarCarrusel() {
  if (carouselInterval) clearInterval(carouselInterval);
  
  carouselInterval = setInterval(() => {
    const carousel = document.getElementById("carousel");
    if (!carousel) return;
    index = (index + 1) % 3;
    carousel.style.transform = `translateX(-${index * 100}%)`;
  }, 5000);
}

// Pausar carrusel al pasar el mouse
const carouselSection = document.querySelector('section.relative.w-full');
if (carouselSection) {
  carouselSection.addEventListener('mouseenter', () => {
    if (carouselInterval) clearInterval(carouselInterval);
  });
  carouselSection.addEventListener('mouseleave', iniciarCarrusel);
}

// Iniciar cuando la página cargue
document.addEventListener("DOMContentLoaded", () => {
  iniciarTodo();
  iniciarCarrusel();
});

// Manejar errores de red
window.addEventListener('online', () => {
  console.log('Conexión restaurada, recargando datos...');
  iniciarTodo();
});

window.addEventListener('offline', () => {
  console.log('Sin conexión a internet');
  const contenedor = document.getElementById("gridProductos");
  contenedor.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-red-500'>Sin conexión a internet. Verifica tu conexión.</p></div>";
});
</script>

<script>
// Forzar ejecución cuando se carga mediante fetch
(function() {
    console.log("🔥 SCRIPT DEL CATÁLOGO EJECUTÁNDOSE");
    
    function iniciarCatalogo() {
        console.log("🚀 Iniciando catálogo...");
        
        // Verificar que existan los elementos
        const grid = document.getElementById("gridProductos");
        const nav = document.getElementById("navCategorias");
        
        if (!grid) {
            console.error("❌ No se encontró gridProductos");
            return;
        }
        
        console.log("✅ Elementos encontrados, cargando productos...");
        
        // Función para cargar productos
        async function cargarProductos() {
            try {
                console.log("📡 Fetching productos...");
                const res = await fetch("http://localhost:3000/api/productos");
                console.log("📡 Respuesta:", res.status);
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const productos = await res.json();
                console.log("✅ Productos recibidos:", productos.length);
                
                if (productos.length === 0) {
                    grid.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-gray-500'>No hay productos</p></div>";
                    return;
                }
                
                // Renderizar productos
                grid.innerHTML = "";
                productos.forEach(p => {
                    const imagenUrl = p.imagen || "https://via.placeholder.com/400x300?text=Sin+Imagen";
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden cursor-pointer group">
                            <div class="relative overflow-hidden h-56">
                                <img src="${imagenUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" 
                                     onerror="this.src='https://via.placeholder.com/400x300?text=Error'">
                                <span class="absolute top-3 right-3 ${p.disponible ? 'bg-green-600' : 'bg-red-600'} text-white text-xs px-3 py-1 rounded-full">
                                    ${p.disponible ? "Disponible" : "Agotado"}
                                </span>
                            </div>
                            <div class="p-5 space-y-2">
                                <p class="text-sm text-gray-400">${escapeHtml(p.categoria || "General")}</p>
                                <h3 class="font-bold text-lg text-gray-800">${escapeHtml(p.nombre)}</h3>
                                <div class="flex justify-between items-center pt-2">
                                    <span class="text-blue-600 font-bold text-xl">C$${typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio}</span>
                                    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">Cotizar</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
            } catch (err) {
                console.error("❌ Error:", err);
                grid.innerHTML = `<div class='col-span-full text-center py-20'>
                    <p class='text-red-500'>Error: ${err.message}</p>
                    <button onclick='location.reload()' class='mt-4 bg-blue-600 text-white px-4 py-2 rounded'>Reintentar</button>
                </div>`;
            }
        }
        
        // Función para cargar categorías
        async function cargarCategorias() {
            if (!nav) return;
            
            try {
                const res = await fetch("http://localhost:3000/api/categorias");
                const categorias = await res.json();
                console.log("📁 Categorías:", categorias.length);
                
                nav.innerHTML = '<div class="px-6 py-2 text-xs font-bold text-gray-400 uppercase">CATEGORÍAS</div>';
                categorias.forEach(c => {
                    nav.innerHTML += `
                        <a onclick="window.filtrarCategoria('${c.nombre}')" class="flex items-center gap-3 text-slate-500 px-6 py-2 hover:bg-slate-100 cursor-pointer transition-colors">
                            <span class="material-symbols-outlined">category</span>
                            <span>${escapeHtml(c.nombre)}</span>
                        </a>
                    `;
                });
                nav.innerHTML += `
                    <div class="border-t my-2"></div>
                    <a onclick="window.mostrarTodos()" class="flex items-center gap-3 text-slate-500 px-6 py-2 hover:bg-slate-100 cursor-pointer transition-colors">
                        <span class="material-symbols-outlined">apps</span>
                        <span>Todos los productos</span>
                    </a>
                `;
            } catch (err) {
                console.error("Error categorías:", err);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Función para filtrar por categoría
        window.filtrarCategoria = async function(categoria) {
            console.log("Filtrando:", categoria);
            try {
                const res = await fetch("http://localhost:3000/api/productos");
                const productos = await res.json();
                const filtrados = productos.filter(p => p.categoria === categoria);
                const grid = document.getElementById("gridProductos");
                if (filtrados.length === 0) {
                    grid.innerHTML = `<div class='col-span-full text-center py-20'><p class='text-gray-500'>No hay productos en ${categoria}</p></div>`;
                } else {
                    grid.innerHTML = "";
                    filtrados.forEach(p => {
                        const imagenUrl = p.imagen || "https://via.placeholder.com/400x300?text=Sin+Imagen";
                        grid.innerHTML += `
                            <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden cursor-pointer group">
                                <div class="relative overflow-hidden h-56">
                                    <img src="${imagenUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/400x300?text=Error'">
                                    <span class="absolute top-3 right-3 ${p.disponible ? 'bg-green-600' : 'bg-red-600'} text-white text-xs px-3 py-1 rounded-full">
                                        ${p.disponible ? "Disponible" : "Agotado"}
                                    </span>
                                </div>
                                <div class="p-5 space-y-2">
                                    <p class="text-sm text-gray-400">${p.categoria || "General"}</p>
                                    <h3 class="font-bold text-lg text-gray-800">${escapeHtml(p.nombre)}</h3>
                                    <div class="flex justify-between items-center pt-2">
                                        <span class="text-blue-600 font-bold text-xl">C$${typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio}</span>
                                        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">Cotizar</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.error("Error filtrando:", err);
            }
        };
        
        // Función para mostrar todos los productos
        window.mostrarTodos = function() {
            cargarProductos();
        };
        
        // Función para mostrar productos
        window.renderProductos = function(productos) {
            const grid = document.getElementById("gridProductos");
            if (!productos || productos.length === 0) {
                grid.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-gray-500'>No hay productos</p></div>";
                return;
            }
            grid.innerHTML = "";
            productos.forEach(p => {
                const imagenUrl = p.imagen || "https://via.placeholder.com/400x300?text=Sin+Imagen";
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden cursor-pointer group">
                        <div class="relative overflow-hidden h-56">
                            <img src="${imagenUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/400x300?text=Error'">
                            <span class="absolute top-3 right-3 ${p.disponible ? 'bg-green-600' : 'bg-red-600'} text-white text-xs px-3 py-1 rounded-full">
                                ${p.disponible ? "Disponible" : "Agotado"}
                            </span>
                        </div>
                        <div class="p-5 space-y-2">
                            <p class="text-sm text-gray-400">${p.categoria || "General"}</p>
                            <h3 class="font-bold text-lg text-gray-800">${escapeHtml(p.nombre)}</h3>
                            <div class="flex justify-between items-center pt-2">
                                <span class="text-blue-600 font-bold text-xl">C$${typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio}</span>
                                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">Cotizar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        };
        
        // Ejecutar carga de datos
        cargarProductos();
        cargarCategorias();
    }
    
    // Verificar si el contenido ya está cargado
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', iniciarCatalogo);
    } else {
        iniciarCatalogo();
    }
    
    // Exponer la función para que pueda ser llamada desde el index
    window.iniciarCatalogo = iniciarCatalogo;
})();
</script>
</body>
</html>
