<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>EDAPymes | Catálogo Tecnológico Empresarial</title>

<!-- Tailwind CSS + Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<!-- Tailwind Custom Config -->
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#0059b6",
        secondary: "#445899"
      },
      fontFamily: {
        headline: ["Manrope", "sans-serif"],
        body: ["Inter", "sans-serif"]
      }
    }
  }
}
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f5f7fb;
  color: #1e293b;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

.material-symbols-outlined {
  vertical-align: middle;
  font-size: 1.25rem;
}

.loading-spinner {
  display: inline-block;
  width: 42px;
  height: 42px;
  border: 4px solid #e2e8f0;
  border-top: 4px solid #0059b6;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Modal de especificaciones */
.specs-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.25s ease-out;
}

.specs-content {
  background: white;
  border-radius: 32px;
  max-width: 520px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}

/* Filtros scroll horizontal */
.filtros-scroll {
  scrollbar-width: thin;
  scrollbar-color: #0059b6 #e2e8f0;
}
.filtros-scroll::-webkit-scrollbar {
  height: 5px;
}
.filtros-scroll::-webkit-scrollbar-track {
  background: #e2e8f0;
  border-radius: 20px;
}
.filtros-scroll::-webkit-scrollbar-thumb {
  background: #0059b6;
  border-radius: 20px;
}

/* Animación cards */
.producto-card {
  transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
}
.producto-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 30px -12px rgba(0,89,182,0.15);
}

.filtro-btn {
  transition: all 0.2s;
  cursor: pointer;
}
.filtro-btn:active {
  transform: scale(0.94);
}

.card-img {
  transition: transform 0.5s ease;
}
.group:hover .card-img {
  transform: scale(1.05);
}

.line-clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Ocultar footer cuando el catálogo se carga dentro del index */
.footer-hidden {
  display: none !important;
}
</style>
</head>
<body>

<!-- CONTENEDOR PRINCIPAL DEL CATÁLOGO -->
<div class="catalogo-container max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 md:py-8">
  
  <!-- BANNER HERO -->
  <section class="relative w-full h-[280px] sm:h-[380px] md:h-[460px] overflow-hidden rounded-2xl md:rounded-3xl shadow-2xl mb-9 md:mb-12">
    <img src="/src/image/image.png" 
         class="w-full h-full object-cover object-center" 
         alt="EDAPymes tecnología empresarial"
         onerror="this.src='https://placehold.co/1600x900/0059b6/white?text=EDAPymes'">
    <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/30 to-transparent flex flex-col justify-center items-start p-6 md:p-12">
      <div class="max-w-2xl">
        <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white drop-shadow-xl">Tecnología de <br><span class="text-primary">Última Generación</span></h2>
        <p class="text-white/90 text-base md:text-lg mt-3">Soluciones empresariales para potenciar tu negocio</p>
      </div>
    </div>
  </section>

  <!-- FILTROS DINÁMICOS -->
  <div class="mb-9 md:mb-12">
    <div class="overflow-x-auto pb-3 filtros-scroll">
      <div class="flex gap-2.5 md:gap-4 min-w-max md:justify-center" id="filtrosContainer">
        <div class="loading-spinner w-6 h-6 border-2"></div>
      </div>
    </div>
  </div>

  <!-- ENCABEZADO + CONTADOR -->
  <div class="flex flex-wrap justify-between items-end border-b border-gray-200/80 pb-4 mb-7">
    <div>
      <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">
        Catálogo <span class="text-primary">Profesional</span>
      </h1>
      <p class="text-gray-500 text-sm mt-1 flex items-center gap-1" id="contadorProductos">
        <span class="material-symbols-outlined text-base">inventory</span> Cargando productos...
      </p>
    </div>
  </div>

  <!-- GRID DE PRODUCTOS -->
  <div id="gridProductos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7 md:gap-8">
    <div class="col-span-full flex flex-col justify-center items-center py-20 gap-3">
      <div class="loading-spinner"></div>
      <span class="text-gray-500 font-medium">Conectando con el servidor...</span>
      <span class="text-gray-400 text-sm">http://localhost:3000</span>
    </div>
  </div>
</div>

<!-- MODAL ESPECIFICACIONES -->
<div id="specsModal" class="specs-modal hidden" onclick="cerrarSpecsModal(event)">
  <div class="specs-content p-5 md:p-7" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-5">
      <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2" id="specsTitle">
        <span class="material-symbols-outlined text-primary">settings_suggest</span>
        Ficha técnica
      </h3>
      <button onclick="cerrarSpecsModal()" class="text-gray-400 hover:text-gray-700">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="specsList" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
  </div>
</div>

<script>
// ======================== VARIABLES GLOBALES ========================
let productosGlobal = [];
let categoriasGlobal = [];
let categoriaActiva = "todos";
let iconosCategoriaMap = {};

const API_BASE = "http://localhost:3000";

// Detectar si estamos dentro del index (para ocultar el footer)
function ocultarFooterSiEsNecesario() {
  // Verificar si existe el footer del index
  const footerIndex = document.getElementById('mainFooter');
  if (footerIndex) {
    footerIndex.classList.add('footer-hidden');
  }
}

// ======================== FUNCIONES UTILITARIAS ========================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function obtenerIconoCategoria(categoriaNombre) {
  if (!categoriaNombre) return 'devices';
  if (iconosCategoriaMap[categoriaNombre]) return iconosCategoriaMap[categoriaNombre];
  
  const nombreLower = categoriaNombre.toLowerCase();
  if (nombreLower.includes('laptop')) return 'laptop';
  if (nombreLower.includes('computadora') || nombreLower.includes('pc')) return 'desktop_windows';
  if (nombreLower.includes('servidor')) return 'dns';
  if (nombreLower.includes('monitor')) return 'monitor';
  if (nombreLower.includes('red')) return 'router';
  if (nombreLower.includes('accesorio')) return 'mouse';
  if (nombreLower.includes('celular') || nombreLower.includes('telefono')) return 'smartphone';
  if (nombreLower.includes('seguridad')) return 'security';
  if (nombreLower.includes('camara')) return 'camera';
  if (nombreLower.includes('audio')) return 'headphones';
  return 'devices';
}

function actualizarContador(cantidad, filtroNombre) {
  const contadorSpan = document.getElementById('contadorProductos');
  if (!contadorSpan) return;
  if (filtroNombre === 'todos') {
    contadorSpan.innerHTML = `<span class="material-symbols-outlined text-base">grid_view</span> ${cantidad} productos disponibles`;
  } else {
    contadorSpan.innerHTML = `<span class="material-symbols-outlined text-base">filter_alt</span> ${cantidad} productos en <strong class="text-primary">${escapeHtml(filtroNombre)}</strong>`;
  }
}

function resaltarBotonActivo(categoriaNombre) {
  const botones = document.querySelectorAll('#filtrosContainer .filtro-btn');
  botones.forEach(btn => {
    const btnCat = btn.getAttribute('data-categoria');
    if (btnCat === categoriaNombre) {
      btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
      btn.classList.add('bg-primary', 'text-white', 'shadow-md', 'border-primary');
    } else {
      btn.classList.remove('bg-primary', 'text-white', 'shadow-md', 'border-primary');
      btn.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
    }
  });
}

// ======================== RENDERIZADO DE PRODUCTOS ========================
function renderizarProductos() {
  const contenedor = document.getElementById("gridProductos");
  if (!contenedor) return;

  let productosFiltrados = [];
  let filtroNombreMostrar = "todos";

  if (categoriaActiva === "todos") {
    productosFiltrados = [...productosGlobal];
    filtroNombreMostrar = "todos";
  } else {
    productosFiltrados = productosGlobal.filter(p => p.categoria === categoriaActiva);
    filtroNombreMostrar = categoriaActiva;
  }

  actualizarContador(productosFiltrados.length, filtroNombreMostrar);

  if (!productosFiltrados.length) {
    contenedor.innerHTML = `
      <div class='col-span-full text-center py-16 bg-white/60 rounded-3xl'>
        <span class="material-symbols-outlined text-6xl text-gray-300">category</span>
        <p class='text-gray-500 mt-3 font-medium'>No hay productos en esta categoría</p>
        <button onclick="filtrarPorCategoria('todos')" class="mt-5 text-primary font-semibold flex items-center gap-2 mx-auto hover:underline">
          <span class="material-symbols-outlined text-base">apps</span> Ver todos
        </button>
      </div>`;
    return;
  }

  contenedor.innerHTML = "";
  
  productosFiltrados.forEach(p => {
    // Obtener la primera imagen
    let imagenUrl = 'https://placehold.co/600x400/e2e8f0/475569?text=EDAPymes';
    if (p.imagenes && p.imagenes.length > 0) {
      imagenUrl = p.imagenes[0];
    } else if (p.imagen) {
      imagenUrl = p.imagen;
    }
    
    const precioFormateado = typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio;
    const categoriaIcono = obtenerIconoCategoria(p.categoria);
    const disponible = p.disponible === true || p.disponible === 1;
    
    // Obtener especificaciones del producto
    let especificacionesList = p.especificaciones || [];
    if (typeof especificacionesList === 'string') {
      try {
        especificacionesList = JSON.parse(especificacionesList);
      } catch(e) {
        especificacionesList = [];
      }
    }
    
    const card = document.createElement('div');
    card.className = "producto-card bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all overflow-hidden cursor-pointer flex flex-col border border-gray-100";
    card.onclick = () => mostrarModalEspecificaciones(p.nombre, especificacionesList);
    
    card.innerHTML = `
      <div class="relative overflow-hidden h-56 bg-gray-100 group">
        <img src="${imagenUrl}" 
             class="card-img w-full h-full object-cover transition-transform duration-500"
             loading="lazy"
             onerror="this.src='https://placehold.co/600x400/e2e8f0/6b7280?text=Imagen'">
        <span class="absolute top-3 right-3 ${disponible ? 'bg-emerald-600' : 'bg-rose-600'} text-white text-xs px-3 py-1.5 rounded-full font-semibold">
          ${disponible ? "Disponible" : "Agotado"}
        </span>
      </div>
      <div class="p-5 space-y-2.5 flex-1 flex flex-col">
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-primary text-sm">${categoriaIcono}</span>
          <p class="text-xs font-semibold text-gray-400 uppercase">${escapeHtml(p.categoria || "General")}</p>
        </div>
        <h3 class="font-bold text-xl text-gray-800 leading-tight">${escapeHtml(p.nombre)}</h3>
        ${p.descripcion ? `<p class="text-sm text-gray-500 line-clamp-2">${escapeHtml(p.descripcion.substring(0, 100))}</p>` : ''}
        <div class="flex justify-between items-center pt-3 mt-auto border-t border-gray-100">
          <span class="text-primary font-extrabold text-2xl">C$${precioFormateado}</span>
          <button onclick="event.stopPropagation(); abrirCotizacion('${escapeHtml(p.nombre)}','${precioFormateado}','${imagenUrl}')" 
                  class="bg-primary/10 hover:bg-primary text-primary hover:text-white transition-all px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-1">
            <span class="material-symbols-outlined text-base">shopping_cart</span>
            Cotizar
          </button>
        </div>
      </div>
    `;
    contenedor.appendChild(card);
  });
}

// ======================== MODAL ========================
function mostrarModalEspecificaciones(nombreProducto, especificaciones) {
  const modal = document.getElementById('specsModal');
  const specsTitle = document.getElementById('specsTitle');
  const specsListDiv = document.getElementById('specsList');
  if (!modal) return;
  
  if (specsTitle) specsTitle.innerHTML = `<span class="material-symbols-outlined text-primary">settings_suggest</span> ${escapeHtml(nombreProducto)}`;
  specsListDiv.innerHTML = '';
  
  if (!especificaciones || especificaciones.length === 0) {
    specsListDiv.innerHTML = `<div class="text-center text-gray-500 py-10">Sin especificaciones técnicas</div>`;
    modal.classList.remove('hidden');
    return;
  }
  
  especificaciones.forEach(spec => {
    const label = spec.label || spec.nombre || 'Característica';
    const value = spec.value || spec.descripcion || 'N/A';
    const icono = spec.icono || 'settings';
    specsListDiv.innerHTML += `
      <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-xl">
        <span class="material-symbols-outlined text-primary">${icono}</span>
        <div class="flex-1">
          <p class="text-xs font-bold text-gray-500 uppercase">${escapeHtml(label)}</p>
          <p class="text-sm font-semibold text-gray-800">${escapeHtml(value)}</p>
        </div>
      </div>
    `;
  });
  modal.classList.remove('hidden');
}

function cerrarSpecsModal(event) {
  const modal = document.getElementById('specsModal');
  if (modal) modal.classList.add('hidden');
}

// ======================== FILTROS ========================
function filtrarPorCategoria(categoriaNombre) {
  categoriaActiva = categoriaNombre;
  resaltarBotonActivo(categoriaActiva);
  renderizarProductos();
  const grid = document.getElementById('gridProductos');
  if (grid) grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function abrirCotizacion(nombre, precio, imagen) {
  const url = `ventanaC.html?nombre=${encodeURIComponent(nombre)}&precio=${encodeURIComponent(precio)}&imagen=${encodeURIComponent(imagen)}`;
  window.location.href = url;
}

// ======================== CONSTRUIR BOTONES DE FILTRO ========================
function construirBotonesFiltros() {
  const container = document.getElementById('filtrosContainer');
  if (!container) return;
  
  container.innerHTML = '';
  
  // Botón "Todos"
  const btnTodos = document.createElement('button');
  btnTodos.setAttribute('data-categoria', 'todos');
  btnTodos.className = "filtro-btn bg-primary text-white shadow-md flex items-center gap-2 px-5 md:px-7 py-2.5 rounded-full text-sm md:text-base font-semibold border border-primary";
  btnTodos.innerHTML = `<span class="material-symbols-outlined">grid_view</span><span>Todos</span>`;
  btnTodos.onclick = () => filtrarPorCategoria('todos');
  container.appendChild(btnTodos);
  
  // Botones de categorías
  const categoriasParaMostrar = categoriasGlobal.length > 0 ? categoriasGlobal : [];
  
  categoriasParaMostrar.forEach(cat => {
    const nombre = cat.nombre;
    const icono = cat.icono || obtenerIconoCategoria(nombre);
    iconosCategoriaMap[nombre] = icono;
    
    const btn = document.createElement('button');
    btn.setAttribute('data-categoria', nombre);
    btn.className = "filtro-btn bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 flex items-center gap-2 px-5 md:px-7 py-2.5 rounded-full text-sm md:text-base font-medium";
    btn.innerHTML = `<span class="material-symbols-outlined">${icono}</span><span>${escapeHtml(nombre)}</span>`;
    btn.onclick = () => filtrarPorCategoria(nombre);
    container.appendChild(btn);
  });
  
  resaltarBotonActivo('todos');
}

// ======================== CARGA DE DATOS DESDE EL BACKEND ========================
async function cargarCategorias() {
  try {
    console.log("📡 Cargando categorías desde:", `${API_BASE}/api/categorias`);
    const response = await fetch(`${API_BASE}/api/categorias`);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    categoriasGlobal = await response.json();
    console.log("✅ Categorías cargadas:", categoriasGlobal.length);
    
    // Guardar iconos en el mapa
    categoriasGlobal.forEach(cat => {
      if (cat.icono) {
        iconosCategoriaMap[cat.nombre] = cat.icono;
      }
    });
    
  } catch (error) {
    console.warn("⚠️ Error cargando categorías:", error.message);
    categoriasGlobal = [];
  }
}

async function cargarProductos() {
  const contenedor = document.getElementById("gridProductos");
  
  try {
    console.log("📡 Cargando productos desde:", `${API_BASE}/api/productos`);
    const response = await fetch(`${API_BASE}/api/productos`);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    productosGlobal = await response.json();
    console.log("✅ Productos cargados:", productosGlobal.length);
    
    if (productosGlobal.length === 0) {
      contenedor.innerHTML = `
        <div class='col-span-full text-center py-16 bg-white/60 rounded-3xl'>
          <span class="material-symbols-outlined text-6xl text-gray-300">inventory</span>
          <p class='text-gray-500 mt-3 font-medium'>No hay productos disponibles</p>
          <p class='text-gray-400 text-sm mt-1'>Agrega productos desde el panel de administración</p>
        </div>`;
      return;
    }
    
    // Extraer categorías únicas de los productos si no hay categorías cargadas
    if (categoriasGlobal.length === 0 && productosGlobal.length > 0) {
      const categoriasSet = new Set();
      productosGlobal.forEach(p => {
        if (p.categoria) categoriasSet.add(p.categoria);
      });
      categoriasGlobal = Array.from(categoriasSet).map(nombre => ({ nombre, icono: obtenerIconoCategoria(nombre) }));
      console.log("📁 Categorías extraídas de productos:", categoriasGlobal);
    }
    
    construirBotonesFiltros();
    renderizarProductos();
    
  } catch (error) {
    console.error("❌ Error cargando productos:", error);
    contenedor.innerHTML = `
      <div class='col-span-full text-center py-16 bg-white/60 rounded-3xl'>
        <span class="material-symbols-outlined text-6xl text-red-400">error</span>
        <p class='text-red-500 mt-3 font-medium'>Error de conexión con el servidor</p>
        <p class='text-gray-500 text-sm mt-2'>${error.message}</p>
        <p class='text-gray-400 text-xs mt-1'>Verifica que el servidor esté corriendo en ${API_BASE}</p>
        <button onclick="location.reload()" class="mt-5 bg-primary text-white px-6 py-2 rounded-full text-sm font-semibold hover:bg-primary/90 transition">
          Reintentar
        </button>
      </div>`;
  }
}

// ======================== INICIALIZACIÓN PRINCIPAL ========================
async function iniciarCatalogo() {
  console.log("🚀 Inicializando catálogo...");
  ocultarFooterSiEsNecesario();
  await cargarCategorias();
  await cargarProductos();
}

// Exponer funciones globales para que puedan ser llamadas desde onclick
window.filtrarPorCategoria = filtrarPorCategoria;
window.abrirCotizacion = abrirCotizacion;
window.cerrarSpecsModal = cerrarSpecsModal;
window.iniciarCatalogo = iniciarCatalogo;

// Iniciar automáticamente cuando el DOM esté listo
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', iniciarCatalogo);
} else {
  iniciarCatalogo();
}
</script>
</body>
</html>
