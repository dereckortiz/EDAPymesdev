<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#0059b6",
        secondary: "#445899"
      },
      fontFamily: {
        headline: ["Manrope"],
        body: ["Inter"]
      }
    }
  }
}
</script>

<style>
body {
  background-color: #f6f6f6;
  color: #2d2f2f;
  font-family: 'Inter', sans-serif;
}
.material-symbols-outlined {
  vertical-align: middle;
}
.loading-spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 4px solid #f3f3f3;
  border-top: 4px solid #0059b6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
/* Estilos para el carrusel de imágenes */
.image-gallery {
  position: relative;
  overflow: hidden;
}
.gallery-thumbnails {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
}
.thumbnail {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.thumbnail:hover, .thumbnail.active {
  border-color: #0059b6;
  transform: scale(1.05);
}
.main-image {
  width: 100%;
  height: 300px;
  object-fit: contain;
  background-color: #f5f5f5;
  border-radius: 12px;
}
/* Modal para especificaciones */
.specs-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s;
}
.specs-content {
  background: white;
  border-radius: 24px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="flex min-h-screen">

<!-- SIDEBAR DINÁMICO -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col gap-2 z-40">
  <div class="px-8 py-6">
    <h2 class="font-bold text-lg text-slate-900">Collections</h2>
    <p class="text-xs text-slate-500">Precision Curated Tech</p>
  </div>

  <nav id="navCategorias" class="flex flex-col gap-1"></nav>
  
  <!-- Botón para mostrar todos los productos -->
  <div class="mt-4 px-6">
    <button onclick="window.mostrarTodosLosProductos()" 
            class="w-full text-left flex items-center gap-3 text-slate-500 px-6 py-3 hover:bg-slate-100 cursor-pointer rounded-lg">
      <span class="material-symbols-outlined">apps</span>
      <span>Todos los productos</span>
    </button>
  </div>
</aside>

<!-- CONTENIDO -->
<main class="ml-64 flex-1">

<!-- CARRUSEL -->
<section class="relative w-full h-[400px] overflow-hidden">
  <div id="carousel" class="flex transition-transform duration-700">
    <div class="min-w-full h-[400px] relative">
      <img src="/src/image/foto11.jpg" class="w-full h-full object-cover" alt="Tecnología">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Tecnología de Última Generación</h2>
      </div>
    </div>
    <div class="min-w-full h-[400px] relative">
      <img src="/src/image/foto12.jpg" class="w-full h-full object-cover" alt="Equipos">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Equipos Profesionales</h2>
      </div>
    </div>
    <div class="min-w-full h-[400px] relative">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" class="w-full h-full object-cover" alt="Accesorios">
      <div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white">
        <h2 class="text-4xl font-bold">Accesorios Premium</h2>
      </div>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-4">
    <input id="buscador"
           type="text"
           placeholder="Buscar productos..."
           class="w-full px-4 py-3 rounded-full shadow-lg outline-none focus:ring-2 focus:ring-blue-500">
  </div>
</section>

<!-- CONTENIDO -->
<div class="p-12">

<header class="mb-16 max-w-4xl">
  <h1 class="text-5xl font-bold mb-6">
    Tecnología <span class="text-primary italic">Empresarial</span>
  </h1>
  <p class="text-lg text-gray-500">
    Soluciones tecnológicas diseñadas para impulsar tu negocio.
  </p>
</header>

<!-- GRID PRODUCTOS -->
<div id="gridProductos"
     class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8">
  <!-- Loading spinner -->
  <div class="col-span-full flex justify-center items-center py-20">
    <div class="loading-spinner"></div>
    <span class="ml-3 text-gray-500">Cargando productos...</span>
  </div>
</div>

</div>
</main>
</div>

<!-- Modal para mostrar especificaciones técnicas -->
<div id="specsModal" class="specs-modal hidden" onclick="cerrarSpecsModal(event)">
  <div class="specs-content p-6" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold" id="specsTitle">Especificaciones Técnicas</h3>
      <button onclick="cerrarSpecsModal()" class="text-gray-500 hover:text-gray-700">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="specsList" class="space-y-3"></div>
  </div>
</div>

<script>
// Variables globales
let productosGlobal = [];
let categoriaActual = null;

// Función para mostrar todos los productos
window.mostrarTodosLosProductos = function() {
  categoriaActual = null;
  window.renderProductos(productosGlobal);
  
  document.querySelectorAll('#navCategorias a').forEach(link => {
    link.classList.remove('bg-slate-200', 'text-primary');
    link.classList.add('text-slate-500');
  });
};

// Función para mostrar modal de especificaciones
window.mostrarEspecificaciones = function(especificaciones) {
  const modal = document.getElementById('specsModal');
  const specsList = document.getElementById('specsList');
  
  if (!especificaciones || especificaciones.length === 0) {
    return;
  }
  
  specsList.innerHTML = '';
  especificaciones.forEach(spec => {
    if (spec.label && spec.value) {
      specsList.innerHTML += `
        <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
          <span class="material-symbols-outlined text-primary">${spec.icono || 'bolt'}</span>
          <div class="flex-1">
            <p class="text-xs font-bold text-gray-500">${escapeHtml(spec.label)}</p>
            <p class="text-sm font-medium text-gray-800">${escapeHtml(spec.value)}</p>
          </div>
        </div>
      `;
    }
  });
  
  if (specsList.innerHTML === '') {
    specsList.innerHTML = '<p class="text-gray-500 text-center">No hay especificaciones técnicas disponibles</p>';
  }
  
  modal.classList.remove('hidden');
};

function cerrarSpecsModal(event) {
  const modal = document.getElementById('specsModal');
  modal.classList.add('hidden');
}
window.cerrarSpecsModal = cerrarSpecsModal;

// Función para cargar productos desde la API
window.cargarProductos = async function() {
  const contenedor = document.getElementById("gridProductos");

  try {
    console.log("Intentando conectar a: http://localhost:3000/api/productos");
    const res = await fetch("http://localhost:3000/api/productos");
    
    console.log("Respuesta del servidor:", res.status);
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    productosGlobal = await res.json();
    console.log("Productos cargados:", productosGlobal.length);
    
    if (productosGlobal.length === 0) {
      console.log("No hay productos en la base de datos");
    }
    
    window.renderProductos(productosGlobal);
  } catch (err) {
    console.error("Error detallado cargando productos:", err);
    contenedor.innerHTML = `<div class='col-span-full text-center py-20'>
      <p class='text-red-500'>Error al cargar productos: ${err.message}</p>
      <p class='text-gray-500 mt-2'>Verifica que el servidor esté corriendo en http://localhost:3000</p>
      <button onclick='window.cargarProductos()' class='mt-4 bg-blue-600 text-white px-4 py-2 rounded'>Reintentar</button>
    </div>`;
  }
};

// Función para renderizar productos
window.renderProductos = function(lista) {
  const contenedor = document.getElementById("gridProductos");
  
  if (!lista || lista.length === 0) {
    contenedor.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-gray-500'>No se encontraron productos</p></div>";
    return;
  }

  contenedor.innerHTML = "";

  lista.forEach(p => {
    // Obtener la imagen principal (la primera del array)
    let imagenUrl = 'https://via.placeholder.com/400x300?text=Sin+Imagen';
    let imagenesArray = [];
    
    if (p.imagenes && p.imagenes.length > 0) {
      imagenesArray = p.imagenes;
      imagenUrl = p.imagenes[0];
    } else if (p.imagen) {
      imagenUrl = p.imagen;
      imagenesArray = [p.imagen];
    } else if (p.imagenes_raw && p.imagenes_raw.length > 0) {
      imagenUrl = `http://localhost:3000/uploads/${p.imagenes_raw[0].filename}`;
      imagenesArray = p.imagenes_raw.map(img => `http://localhost:3000/uploads/${img.filename}`);
    }
    
    const precioFormateado = typeof p.precio === 'number' ? p.precio.toFixed(2) : p.precio;
    const tieneEspecificaciones = p.especificaciones && p.especificaciones.length > 0 && p.especificaciones.some(s => s.label && s.value);
    const categoriaIcono = p.categoriaIcono || 'category';
    
    contenedor.innerHTML += `
    <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden cursor-pointer group flex flex-col">
      <div class="relative overflow-hidden h-56">
        <img src="${imagenUrl}" 
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
             onerror="this.src='https://via.placeholder.com/400x300?text=Imagen+no+disponible'">
        <span class="absolute top-3 right-3 ${p.disponible ? 'bg-green-600' : 'bg-red-600'} text-white text-xs px-3 py-1 rounded-full">
          ${p.disponible ? "Disponible" : "Agotado"}
        </span>
        ${imagenesArray.length > 1 ? '<span class="absolute bottom-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded-full flex items-center gap-1"><span class="material-symbols-outlined text-sm">collections</span> ' + imagenesArray.length + '</span>' : ''}
      </div>
      <div class="p-5 space-y-2 flex-1 flex flex-col">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">${categoriaIcono}</span>
          <p class="text-sm text-gray-400">${escapeHtml(p.categoria || "General")}</p>
        </div>
        <h3 class="font-bold text-lg text-gray-800 line-clamp-2">${escapeHtml(p.nombre)}</h3>
        ${p.descripcion ? `<p class="text-sm text-gray-500 line-clamp-2">${escapeHtml(p.descripcion.substring(0, 100))}</p>` : ''}
        <div class="flex justify-between items-center pt-2 mt-auto">
          <span class="text-blue-600 font-bold text-xl">
            C$${precioFormateado}
          </span>
          <div class="flex gap-2">
            ${tieneEspecificaciones ? `<button onclick="event.stopPropagation(); window.mostrarEspecificaciones(${JSON.stringify(p.especificaciones).replace(/"/g, '&quot;')})" 
                    class="bg-gray-100 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-200 transition-colors flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">bolt</span> Especs
            </button>` : ''}
            <button onclick="event.stopPropagation(); window.verProducto('${escapeHtml(p.nombre)}','${p.precio}','${imagenUrl}')" 
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
              Cotizar
            </button>
          </div>
        </div>
      </div>
    </div>`;
  });
};

// Función para escapar HTML (seguridad)
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Función para cargar categorías desde la API
window.cargarCategorias = async function() {
  const nav = document.getElementById("navCategorias");

  try {
    const res = await fetch("http://localhost:3000/api/categorias");
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    const categorias = await res.json();
    console.log("Categorías cargadas:", categorias.length);

    nav.innerHTML = "";

    if (categorias.length === 0) {
      nav.innerHTML = "<p class='px-6 text-gray-500'>No hay categorías</p>";
      return;
    }

    categorias.forEach(c => {
      const icono = c.icono || 'category';
      nav.innerHTML += `
      <a onclick="window.filtrarCategoria('${escapeHtml(c.nombre)}')"
         class="flex items-center gap-3 text-slate-500 px-6 py-3 hover:bg-slate-100 cursor-pointer transition-colors categoria-link">
        <span class="material-symbols-outlined">${icono}</span>
        <span>${escapeHtml(c.nombre)}</span>
      </a>`;
    });

  } catch (err) {
    console.error("Error cargando categorías:", err);
    nav.innerHTML = "<p class='px-6 text-red-500'>Error al cargar categorías</p>";
  }
};

// Función para filtrar por categoría
window.filtrarCategoria = function(nombre) {
  categoriaActual = nombre;
  const filtrados = productosGlobal.filter(p => p.categoria === nombre);
  window.renderProductos(filtrados);
  
  document.querySelectorAll('#navCategorias a').forEach(link => {
    const linkText = link.querySelector('span:last-child')?.innerText;
    if (linkText === nombre) {
      link.classList.add('bg-slate-200', 'text-primary');
      link.classList.remove('text-slate-500');
    } else {
      link.classList.remove('bg-slate-200', 'text-primary');
      link.classList.add('text-slate-500');
    }
  });
};

// Función de búsqueda en tiempo real
let timeoutId;
document.addEventListener("input", e => {
  if (e.target.id === "buscador") {
    clearTimeout(timeoutId);
    timeoutId = setTimeout(() => {
      const texto = e.target.value.toLowerCase().trim();
      
      let filtrados;
      if (texto === "") {
        if (categoriaActual) {
          filtrados = productosGlobal.filter(p => p.categoria === categoriaActual);
        } else {
          filtrados = [...productosGlobal];
        }
      } else {
        filtrados = productosGlobal.filter(p => 
          p.nombre.toLowerCase().includes(texto) ||
          (p.categoria && p.categoria.toLowerCase().includes(texto)) ||
          (p.descripcion && p.descripcion.toLowerCase().includes(texto))
        );
      }
      window.renderProductos(filtrados);
    }, 300);
  }
});

// Función para ver producto (redirigir a ventana de cotización)
window.verProducto = function(nombre, precio, imagen) {
  const url = `ventanaC.html?nombre=${encodeURIComponent(nombre)}&precio=${encodeURIComponent(precio)}&imagen=${encodeURIComponent(imagen)}`;
  window.location.href = url;
};

// Inicializar todo
function iniciarTodo() {
  window.cargarProductos();
  window.cargarCategorias();
}

// Carrusel automático
let index = 0;
let carouselInterval;

function iniciarCarrusel() {
  if (carouselInterval) clearInterval(carouselInterval);
  
  carouselInterval = setInterval(() => {
    const carousel = document.getElementById("carousel");
    if (!carousel) return;
    index = (index + 1) % 3;
    carousel.style.transform = `translateX(-${index * 100}%)`;
  }, 5000);
}

// Pausar carrusel al pasar el mouse
const carouselSection = document.querySelector('section.relative.w-full');
if (carouselSection) {
  carouselSection.addEventListener('mouseenter', () => {
    if (carouselInterval) clearInterval(carouselInterval);
  });
  carouselSection.addEventListener('mouseleave', iniciarCarrusel);
}

// Iniciar cuando la página cargue directamente
document.addEventListener("DOMContentLoaded", () => {
  iniciarTodo();
  iniciarCarrusel();
});

// Manejar errores de red
window.addEventListener('online', () => {
  console.log('Conexión restaurada, recargando datos...');
  iniciarTodo();
});

window.addEventListener('offline', () => {
  console.log('Sin conexión a internet');
  const contenedor = document.getElementById("gridProductos");
  contenedor.innerHTML = "<div class='col-span-full text-center py-20'><p class='text-red-500'>Sin conexión a internet. Verifica tu conexión.</p></div>";
});

// Exponer la función iniciarTodo globalmente para que el index pueda llamarla
window.iniciarCatalogo = iniciarTodo;

// También exponer las funciones individuales
window.escapeHtml = escapeHtml;
window.productosGlobal = () => productosGlobal;
window.setProductosGlobal = (data) => { productosGlobal = data; };
</script>

</body>
</html>
